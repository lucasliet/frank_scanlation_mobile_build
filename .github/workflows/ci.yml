name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-22.04, macos-latest, windows-latest]
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          key: ${{ matrix.platform }}
          cache-on-failure: true

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Bun install cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            ~/AppData/Local/bun/cache
          key: bun-${{ runner.os }}-${{ hashFiles('desktop/bun.lock', 'desktop/package.json') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install frontend dependencies
        working-directory: desktop
        run: bun install --frozen-lockfile

      - name: Run Rust tests (scanlation-core)
        run: cargo test -p scanlation-core

      - name: Run Rust tests (scanlation-desktop)
        run: cargo test -p scanlation-desktop

      - name: Check Rust formatting
        run: cargo fmt --check

      - name: Clippy (scanlation-core)
        run: cargo clippy -p scanlation-core --lib --tests -- -D warnings

      - name: Clippy (scanlation-desktop)
        run: cargo clippy -p scanlation-desktop --lib --tests -- -D warnings

      - name: Frontend + injected reader tests
        working-directory: desktop
        run: bun run test

      - name: Build frontend (SvelteKit static export)
        working-directory: desktop
        run: bun run build
