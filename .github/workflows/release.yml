name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  actions: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            rust_target: x86_64-unknown-linux-gnu
            label: linux-x86_64
          - platform: macos-latest
            rust_target: aarch64-apple-darwin
            label: macos-aarch64
          - platform: windows-latest
            rust_target: x86_64-pc-windows-msvc
            label: windows-x86_64

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          key: ${{ matrix.rust_target }}
          cache-on-failure: true

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Bun install cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            ~/AppData/Local/bun/cache
          key: bun-${{ runner.os }}-${{ hashFiles('desktop/bun.lock', 'desktop/package.json') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Install frontend dependencies
        working-directory: desktop
        run: bun install --frozen-lockfile

      - name: Run Rust tests
        run: cargo test -p scanlation-core

      # macOS: Import code-signing certificate into a temporary keychain.
      - name: Import Apple certificate
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERT_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          echo -n "$APPLE_CERTIFICATE" | base64 --decode > $CERT_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # No -t cert: the p12 carries the private key too, and typing
          # it as a bare certificate can drop the key half — without the
          # key there is no signing identity at all.
          security import $CERT_PATH -P "$APPLE_CERTIFICATE_PASSWORD" -A -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          # GitHub runners don't ship Apple's intermediate CAs; without
          # them the imported identity fails validation and
          # find-identity -v reports nothing. Best-effort import.
          for ca in DeveloperIDG2CA AppleWWDRCAG3 AppleWWDRCAG4; do
            curl -fsSo "$RUNNER_TEMP/$ca.cer" "https://www.apple.com/certificateauthority/$ca.cer" \
              && security import "$RUNNER_TEMP/$ca.cer" -k $KEYCHAIN_PATH -t cert -A \
              || echo "note: intermediate $ca not imported"
          done

          echo "Certificates in keychain:"
          security find-certificate -a $KEYCHAIN_PATH | sed -n 's/.*"labl"<blob>="\(.*\)"/  - \1/p'
          echo "All identities (including invalid):"
          security find-identity -p codesigning $KEYCHAIN_PATH || true

          # Derive the signing identity from the imported certificate so
          # an APPLE_SIGNING_IDENTITY secret is not required.
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" \
            | sed -n 's/.*"\(.*\)"/\1/p' | head -1)
          if [ -z "$IDENTITY" ]; then
            echo "No VALID codesigning identity in the imported certificate." >&2
            echo "If identities are listed above but not valid, the cert chain is incomplete." >&2
            echo "If none are listed at all, the exported .p12 is missing the private key" >&2
            echo "or is not a Developer ID Application / Apple Development certificate." >&2
            exit 1
          fi
          echo "Using signing identity: $IDENTITY"
          echo "DERIVED_SIGNING_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"

      - name: Verify Apple notary credentials
        if: runner.os == 'macOS'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          pw_len=${#APPLE_PASSWORD}
          pw_dashes=$(printf %s "$APPLE_PASSWORD" | tr -cd '-' | wc -c | tr -d ' ')
          pw_no_ws=$(printf %s "$APPLE_PASSWORD" | tr -d '[:space:]')
          pw_no_ws_len=${#pw_no_ws}
          id_len=${#APPLE_ID}
          id_has_at=$(printf %s "$APPLE_ID" | grep -c '@' || true)
          team_len=${#APPLE_TEAM_ID}
          echo "APPLE_PASSWORD length: $pw_len (expected 19 for xxxx-xxxx-xxxx-xxxx)"
          echo "APPLE_PASSWORD dash count: $pw_dashes (expected 3)"
          echo "APPLE_PASSWORD length without whitespace: $pw_no_ws_len (must equal $pw_len)"
          echo "APPLE_ID length: $id_len"
          echo "APPLE_ID contains '@': $id_has_at (expected 1)"
          echo "APPLE_TEAM_ID length: $team_len (expected 10)"
          echo
          echo "Calling xcrun notarytool history to validate against Apple..."
          if xcrun notarytool history \
              --apple-id "$APPLE_ID" \
              --team-id "$APPLE_TEAM_ID" \
              --password "$APPLE_PASSWORD"; then
            echo "OK: Apple accepted the credentials. Proceeding to build."
          else
            echo
            echo "Apple rejected the credentials. Cross-reference the format check above:"
            echo "  - password length != 19 or dashes != 3 -> malformed app-specific password"
            echo "  - password length != length-without-whitespace -> trailing newline/space"
            echo "  - APPLE_ID '@' count != 1 -> not an email"
            echo "  - team_len != 10 -> wrong Team ID"
            echo "  - all format checks pass -> the app-specific password was revoked or"
            echo "    does not belong to this APPLE_ID. Regenerate at:"
            echo "    https://account.apple.com/account/manage"
            exit 1
          fi

      - name: Load release notes
        id: release-notes
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          NOTES_FILE="releases/${TAG}.md"
          if [ -f "$NOTES_FILE" ]; then
            BODY=$(cat "$NOTES_FILE")
          else
            BODY="Release ${TAG}"
          fi
          BODY="${BODY}

          ## Install

          | Platform | File |
          |----------|------|
          | Linux (AppImage) | \`FRANK.Scanlation_${TAG#v}_amd64.AppImage\` |
          | Linux (.deb)     | \`FRANK.Scanlation_${TAG#v}_amd64.deb\` |
          | Linux (.rpm)     | \`FRANK.Scanlation-${TAG#v}-1.x86_64.rpm\` |
          | Linux (Arch / AUR) | \`yay -S frank-scanlation-bin\` |
          | macOS (Apple Silicon) | \`FRANK.Scanlation_${TAG#v}_aarch64.dmg\` |
          | Windows installer | \`FRANK.Scanlation_${TAG#v}_x64-setup.exe\` |
          | Windows MSI | \`FRANK.Scanlation_${TAG#v}_x64_en-US.msi\` |

          ### Windows first launch
          The installer is not code-signed. SmartScreen may show a warning — click **More info** then **Run anyway**. One-time only.
          "
          echo "body<<RELEASE_EOF" >> "$GITHUB_OUTPUT"
          echo "$BODY" >> "$GITHUB_OUTPUT"
          echo "RELEASE_EOF" >> "$GITHUB_OUTPUT"

      - name: Build Tauri app
        id: tauri-build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Tauri updater signing (optional; only set if you have keys)
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS code signing: explicit secret wins, otherwise the
          # identity derived from the imported certificate.
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY || env.DERIVED_SIGNING_IDENTITY }}
          # macOS notarization
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: desktop
          tagName: ${{ github.ref_name }}
          releaseName: "FRANK Scanlation ${{ github.ref_name }}"
          releaseBody: ${{ steps.release-notes.outputs.body }}
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.rust_target }}

  # After all platform builds succeed, kick off the AUR publish.
  # The release.published event normally chains here automatically, but
  # GitHub suppresses downstream triggers when a release is created by
  # GITHUB_TOKEN (anti-loop guard) — explicit workflow_dispatch from
  # this job sidesteps the guard.
  publish-aur:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: Dispatch AUR publish workflow
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run aur-publish.yml \
            -f tag="${{ github.ref_name }}" \
            --repo "${{ github.repository }}"
